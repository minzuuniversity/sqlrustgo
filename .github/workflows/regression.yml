name: Regression Tests

on:
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Test mode'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - incremental
          - priority
      priority:
        description: 'Priority level (for priority mode)'
        required: false
        default: 'P0'
        type: choice
        options:
          - P0
          - P1
          - P2
          - P3
          - P4
  schedule:
    - cron: '0 2 * * *'
  pull_request:
    branches:
      - main
      - develop
      - release/*
  push:
    branches:
      - main
      - develop

env:
  CARGO_TERM_COLOR: always

jobs:
  determine-tests:
    runs-on: ubuntu-latest
    outputs:
      test_count: ${{ steps.analyze.outputs.test_count }}
      test_type: ${{ steps.analyze.outputs.test_type }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: analyze
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "test_type=${{ github.inputs.test_mode }}" >> $GITHUB_OUTPUT
            echo "test_count=all" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "test_type=incremental" >> $GITHUB_OUTPUT
            changed_files=$(git diff --name-only origin/${{ github.base_ref }} HEAD | grep -E '\.(rs|toml)$' | wc -l)
            echo "test_count=$changed_files" >> $GITHUB_OUTPUT
          else
            echo "test_type=full" >> $GITHUB_OUTPUT
            echo "test_count=all" >> $GITHUB_OUTPUT
          fi

  unit-tests:
    needs: determine-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        run: |
          rustup install stable
          rustup default stable

      - name: Run Unit Tests
        run: cargo test --test '*_test' --lib -- --test-threads=4

  integration-tests:
    needs: determine-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        run: |
          rustup install stable
          rustup default stable

      - name: Run Integration Tests
        run: cargo test --test '*_test' --test-threads=2

  anomaly-tests:
    needs: determine-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        run: |
          rustup install stable
          rustup default stable

      - name: Run Anomaly Tests
        run: cargo test --test mvcc_concurrency_test --test catalog_consistency_test

  stress-tests:
    needs: determine-tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        run: |
          rustup install stable
          rustup default stable

      - name: Run Stress Tests
        run: cargo test --test stress_test -- --test-threads=1

  sql-fuzz:
    needs: determine-tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        run: |
          rustup install stable
          rustup default stable
          rustup component add rustfmt

      - name: Build SQLancer
        run: cargo build --release -p sqlancer

      - name: Run SQL Fuzz
        run: |
          timeout 600 cargo run --release -p sqlancer -- --duration 300 || true

  generate-report:
    needs: [unit-tests, integration-tests, anomaly-tests, stress-tests, sql-fuzz]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        run: |
          rustup install stable
          rustup default stable

      - name: Generate Test Summary
        run: |
          echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Anomaly Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Stress Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| SQL Fuzz | ✅ Completed |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Full regression test suite passed.**" >> $GITHUB_STEP_SUMMARY

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            target/**/test-results/*.json
            target/**/test-results/*.html
          retention-days: 30
